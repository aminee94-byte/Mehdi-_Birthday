<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="85%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#08030f"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- big cake emoji -->
  <text x="600" y="285" font-size="180" text-anchor="middle" dominant-baseline="middle">🎂</text>

  <!-- title -->
  <text x="600" y="430" font-family="Inter, sans-serif" font-size="84" font-weight="900" text-anchor="middle" fill="url(#title-grad)" letter-spacing="-3">
    Happy Birthday Mehdi
  </text>

  <!-- subtitle -->
  <text x="600" y="490" font-family="Inter, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="rgba(255,255,255,0.65)" letter-spacing="2">
    25 YEARS · A SMALL THING FROM AMINE
  </text>

  <!-- arabic -->
  <text x="600" y="555" font-family="Amiri, Georgia, serif" font-size="36" font-weight="700" text-anchor="middle" fill="#fecdd3">
    عيد ميلاد سعيد يا مهدي
  </text>
</svg>
